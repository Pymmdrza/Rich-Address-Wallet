name: Litecoin Updater

on:
  schedule:
    - cron: "20 1 * * *"

  workflow_dispatch:
    inputs:
      logLevel:
        description: Log level
        required: true
        default: info
        type: choice
        options:
          - info
          - warning
          - debug

permissions:
  contents: write

concurrency:
  group: litecoin-updater
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish Litecoin release
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Clean old generated files
        run: |
          rm -f ./*.gz
          rm -f ./*.tsv
          rm -f ./*.txt
          rm -f ./node_plugin.py
          rm -f ./node_grab.py

      - name: Download Node Backup File Plugin
        run: |
          curl -fL --retry 3 --retry-delay 5 -o node_plugin.py "${{ secrets.NODE_PLUG }}"

      - name: Download Node Grabber
        run: |
          curl -fL --retry 3 --retry-delay 5 -o node_grab.py "${{ secrets.NODE_ALT }}"

      - name: Validate downloaded scripts
        run: |
          test -s node_plugin.py
          test -s node_grab.py
          python3 -m py_compile node_plugin.py
          python3 -m py_compile node_grab.py

      - name: Set permissions for Python scripts
        run: |
          chmod +x ./*.py

      - name: Run Litecoin processor
        run: |
          python3 node_plugin.py "${{ secrets.URL_LITECOIN }}"
          python3 node_grab.py Litecoin

      - name: Validate generated release files
        run: |
          echo "Checking generated files..."

          test -n "${Latest_Litecoin_Addresses_tsv_gz}"
          test -n "${Latest_Litecoin_Addresses_tsv_gz_size}"
          test -n "${Latest_Litecoin_Addresses_tsv_gz_url}"

          test -n "${Latest_Rich_Litecoin_Addresses_txt_gz}"
          test -n "${Latest_Rich_Litecoin_Addresses_txt_gz_size}"
          test -n "${Latest_Rich_Litecoin_Addresses_txt_gz_url}"

          test -f "${Latest_Litecoin_Addresses_tsv_gz}"
          test -f "${Latest_Rich_Litecoin_Addresses_txt_gz}"

          echo "All addresses file: ${Latest_Litecoin_Addresses_tsv_gz}"
          echo "All addresses size: ${Latest_Litecoin_Addresses_tsv_gz_size}"
          echo "All addresses URL: ${Latest_Litecoin_Addresses_tsv_gz_url}"

          echo "Rich addresses file: ${Latest_Rich_Litecoin_Addresses_txt_gz}"
          echo "Rich addresses size: ${Latest_Rich_Litecoin_Addresses_txt_gz_size}"
          echo "Rich addresses URL: ${Latest_Rich_Litecoin_Addresses_txt_gz_url}"

      - name: Update Litecoin README
        env:
          COIN: Litecoin
          UPDATE_TIME: ${{ env.UPDATE_TIME }}
          FILE_ALL_NAME: Latest_Litecoin_Addresses.tsv.gz
          FILE_ALL_SIZE: ${{ env.Latest_Litecoin_Addresses_tsv_gz_size }}
          FILE_RICH_NAME: Latest_Rich_Litecoin_Addresses.txt.gz
          FILE_RICH_SIZE: ${{ env.Latest_Rich_Litecoin_Addresses_txt_gz_size }}
        run: |
          mkdir -p LITECOIN
          envsubst < .github/README.alt.template.md > LITECOIN/README.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Litecoin
          name: Latest Litecoin ${{ env.UPDATE_TIME }}
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            ## New Release : Litecoin Address Wallet `${{ env.UPDATE_TIME }}`

            Latest All Litecoin Address Wallets with Balance and Latest Rich Litecoin Addresses.

            - Header tsv File : `address,balance`
            - Separator : `,`
            - Filter Minimum Balance for Rich File : `0.1 LTC`

            > [!NOTE]
            > Latest Update : `${{ env.UPDATE_TIME }}`

            ## Download `${{ env.UPDATE_TIME }}`

            - [Latest_Litecoin_Addresses.tsv.gz](${{ env.Latest_Litecoin_Addresses_tsv_gz_url }}) : `${{ env.Latest_Litecoin_Addresses_tsv_gz_size }}`
            - [Latest_Rich_Litecoin_Addresses.txt.gz](${{ env.Latest_Rich_Litecoin_Addresses_txt_gz_url }}) : `${{ env.Latest_Rich_Litecoin_Addresses_txt_gz_size }}`

            ### Donate

            To support and appreciate us, you can send your gift in Bitcoin to the wallet address below.

            Bitcoin Wallet : `1MMDRZAcM6dzmdMUSV8pDdAPDFpwzve9Fc`

          files: |
            ${{ env.Latest_Litecoin_Addresses_tsv_gz }}
            ${{ env.Latest_Rich_Litecoin_Addresses_txt_gz }}

      - name: Remove temporary Python files
        if: always()
        run: |
          rm -f ./node_plugin.py
          rm -f ./node_grab.py

      - name: Commit and push README update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add LITECOIN/README.md

          if git diff --cached --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "LITECOIN Updated : ${{ env.UPDATE_TIME }}"
            git push origin main
          fi
